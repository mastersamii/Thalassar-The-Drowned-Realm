<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC Codex | Thalassar</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">THALASSAR</a>
      <button class="menu-btn" id="menuBtn">Menu</button>

      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="sessions.html">Sessions</a>
        <a href="npcs.html">NPCs</a>
        <a href="maps.html">Maps</a>
        <a href="shops.html">Shops</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Gallery</a>
        <button class="theme-btn" id="themeBtn">Light / Dark</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="searchable">
      <p class="eyebrow">Player Companion</p>
      <h1>NPC Codex</h1>
      <p class="tagline">
        Every person the party has met in Thalassar. This page only shows player-safe information.
      </p>
    </section>

    <section class="searchable">
      <h2>Search NPCs</h2>
      <input id="searchInput" class="search-box" type="text" placeholder="Search by name, race, role, location, or session..." />

      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Academy">Academy</button>
        <button class="filter-btn" data-filter="Squad 9">Squad 9</button>
        <button class="filter-btn" data-filter="Civilian">Civilians</button>
        <button class="filter-btn" data-filter="Royalty">Royalty</button>
        <button class="filter-btn" data-filter="Merchant">Merchants</button>
      </div>
    </section>

    <section>
      <h2>Known Faces</h2>
      <div id="npcGrid" class="npc-grid"></div>
    </section>
  </main>

  <button id="topBtn">↑ Top</button>

  <footer class="site-footer">
    <p>The Sea Remembers Every Name.</p>
    <p>© <span id="year"></span> Thalassar Player Companion</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/npcs.js"></script>
</body>
</html>
