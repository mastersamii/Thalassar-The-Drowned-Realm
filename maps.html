<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unlocked Maps | Thalassar</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html">THALASSAR</a>
      <button class="menu-btn" id="menuBtn">Menu</button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="sessions.html">Sessions</a>
        <a href="npcs.html">NPCs</a>
        <a href="maps.html">Maps</a>
        <a href="shops.html">Shops</a>
        <a href="music.html">Music</a>
        <a href="gallery.html">Gallery</a>
        <button class="theme-btn" id="themeBtn">Light / Dark</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="searchable">
      <p class="eyebrow">Player Companion</p>
      <h1>Unlocked Maps</h1>
      <p class="tagline">Maps appear here once the party has visited or discovered them. Click pins to see player-safe location notes.</p>
    </section>

    <section class="searchable">
      <h2>Search Maps</h2>
      <input id="searchInput" class="search-box" type="text" placeholder="Search maps, districts, shops, or locations..." />
    </section>

    <section>
      <h2>Map Archive</h2>
      <div id="mapsGrid" class="map-archive"></div>
    </section>
  </main>

  <div id="mapModal" class="map-modal" aria-hidden="true">
    <div class="map-modal-inner">
      <button id="closeMapModal" class="map-modal-close">×</button>
      <div id="mapModalContent"></div>
    </div>
  </div>

  <button id="topBtn">↑ Top</button>
  <footer class="site-footer">
    <p>The Sea Remembers Every Name.</p>
    <p>© <span id="year"></span> Thalassar Player Companion</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/maps.js"></script>
